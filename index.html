<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบคำนวณต้นทุนปุ๋ยและยา</title>
    
    <!-- นำเข้า Tailwind CSS สำหรับความสวยงาม -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- นำเข้า React และ ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- นำเข้า Babel สำหรับแปลงโค้ด React ให้ทำงานบนเบราว์เซอร์ได้ทันที -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <!-- จุดที่ React จะนำแอปมาแสดงผล -->
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- ชุดไอคอน (Inline SVGs แทนการใช้ Library ภายนอกเพื่อให้ทำงานในไฟล์เดียวได้สมบูรณ์) ---
        const IconCalculator = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" x2="16" y1="6" y2="6"/><line x1="16" x2="16" y1="14" y2="18"/><path d="M16 10h.01"/><path d="M12 10h.01"/><path d="M8 10h.01"/><path d="M12 14h.01"/><path d="M8 14h.01"/><path d="M12 18h.01"/><path d="M8 18h.01"/></svg>;
        const IconPlus = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M5 12h14"/><path d="M12 5v14"/></svg>;
        const IconTrash2 = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>;
        const IconDroplet = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 22a7 7 0 0 0 7-7c0-2-1-3.9-3-5.5s-3.5-4-4-6.5c-.5 2.5-2 4.9-4 6.5C6 11.1 5 13 5 15a7 7 0 0 0 7 7z"/></svg>;
        const IconFlaskConical = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M10 2v7.527a2 2 0 0 1-.211.896L4.72 20.55a2 2 0 0 0 1.79 2.95h10.98a2 2 0 0 0 1.79-2.95l-5.07-10.127a2 2 0 0 1-.211-.896V2"/><path d="M8.5 2h7"/><path d="M14 16.13V12"/></svg>;
        const IconBeaker = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M4.5 3h15"/><path d="M6 3v16a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V3"/><path d="M6 14h12"/></svg>;
        const IconSave = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>;
        const IconArrowRightLeft = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m16 3 4 4-4 4"/><path d="M20 7H4"/><path d="m8 21-4-4 4-4"/><path d="M4 17h16"/></svg>;

        // --- ส่วนประกอบหลักของ Application ---
        function App() {
            const [items, setItems] = useState(() => {
                const saved = localStorage.getItem('agri_calculator_items_html');
                return saved ? JSON.parse(saved) : [];
            });

            const [formData, setFormData] = useState({
                name: '', price: '', size: '', sizeUnit: 'kg', usage: '', usageUnit: 'g'
            });

            useEffect(() => {
                localStorage.setItem('agri_calculator_items_html', JSON.stringify(items));
            }, [items]);

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => ({ ...prev, [name]: value }));
            };

            const handleAddItem = (e) => {
                e.preventDefault();
                if (!formData.name || !formData.price || !formData.size || !formData.usage) return;

                const newItem = {
                    id: crypto.randomUUID(),
                    name: formData.name,
                    price: parseFloat(formData.price),
                    size: parseFloat(formData.size),
                    sizeUnit: formData.sizeUnit,
                    usage: parseFloat(formData.usage),
                    usageUnit: formData.usageUnit,
                };

                setItems(prev => [...prev, newItem]);
                setFormData(prev => ({ ...prev, name: '', price: '', size: '', usage: '' }));
            };

            const handleRemoveItem = (id) => {
                setItems(prev => prev.filter(item => item.id !== id));
            };

            const handleClearAll = () => {
                if (window.confirm('คุณแน่ใจหรือไม่ว่าต้องการล้างข้อมูลทั้งหมด?')) {
                    setItems([]);
                    localStorage.removeItem('agri_calculator_items_html');
                }
            };

            const convertToBase = (value, unit) => {
                if (unit === 'kg' || unit === 'L') return value * 1000;
                return value;
            };

            const getBaseUnitLabel = (unit) => {
                return (unit === 'kg' || unit === 'g') ? 'g' : 'cc';
            };

            const calculateItemCost200L = (item) => {
                const baseSize = convertToBase(item.size, item.sizeUnit);
                const baseUsage = convertToBase(item.usage, item.usageUnit);
                if (baseSize <= 0) return 0;
                return (item.price / baseSize) * baseUsage;
            };

            const totalCost200L = items.reduce((sum, item) => sum + calculateItemCost200L(item), 0);
            const totalCost1L = totalCost200L / 200;
            const totalCost1000L = totalCost200L * 5;

            const formatCurrency = (num) => {
                return num.toLocaleString('th-TH', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            };

            return (
                <div className="min-h-screen bg-slate-50 font-sans text-slate-800 pb-12">
                    <header className="bg-emerald-700 text-white py-6 shadow-md">
                        <div className="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 flex items-center gap-3">
                            <div className="p-2 bg-emerald-600 rounded-lg shadow-inner">
                                <IconCalculator className="w-8 h-8 text-emerald-50" />
                            </div>
                            <div>
                                <h1 className="text-2xl font-bold tracking-tight">ระบบคำนวณต้นทุนปุ๋ยและยา</h1>
                                <p className="text-emerald-100 text-sm mt-1 flex items-center gap-1">
                                    <IconArrowRightLeft className="w-4 h-4" /> 
                                    รองรับระบบแปลงหน่วยอัตโนมัติ (kg, g, L, cc)
                                </p>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 mt-8">
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                            <div className="bg-white rounded-2xl p-6 shadow-sm border border-emerald-100 relative overflow-hidden">
                                <div className="absolute top-0 right-0 p-4 opacity-10 text-emerald-600">
                                    <IconDroplet className="w-24 h-24" />
                                </div>
                                <div className="relative z-10">
                                    <p className="text-sm font-medium text-slate-500 mb-1 flex items-center gap-2">
                                        <IconDroplet className="w-4 h-4 text-emerald-500" /> ต้นทุนรวมต่อถัง 200 ลิตร
                                    </p>
                                    <p className="text-4xl font-bold text-emerald-700">฿{formatCurrency(totalCost200L)}</p>
                                </div>
                            </div>

                            <div className="bg-white rounded-2xl p-6 shadow-sm border border-blue-100 relative overflow-hidden">
                                <div className="absolute top-0 right-0 p-4 opacity-10 text-blue-600">
                                    <IconBeaker className="w-24 h-24" />
                                </div>
                                <div className="relative z-10">
                                    <p className="text-sm font-medium text-slate-500 mb-1 flex items-center gap-2">
                                        <IconBeaker className="w-4 h-4 text-blue-500" /> ต้นทุนรวมต่อถัง 1,000 ลิตร
                                    </p>
                                    <p className="text-4xl font-bold text-blue-700">฿{formatCurrency(totalCost1000L)}</p>
                                </div>
                            </div>

                            <div className="bg-white rounded-2xl p-6 shadow-sm border border-amber-100 relative overflow-hidden">
                                <div className="absolute top-0 right-0 p-4 opacity-10 text-amber-600">
                                    <IconFlaskConical className="w-24 h-24" />
                                </div>
                                <div className="relative z-10">
                                    <p className="text-sm font-medium text-slate-500 mb-1 flex items-center gap-2">
                                        <IconFlaskConical className="w-4 h-4 text-amber-500" /> ต้นทุนเฉลี่ยต่อ 1 ลิตร
                                    </p>
                                    <p className="text-4xl font-bold text-amber-600">฿{formatCurrency(totalCost1L)}</p>
                                </div>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 xl:grid-cols-12 gap-8">
                            <div className="xl:col-span-4">
                                <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 sticky top-6">
                                    <h2 className="text-lg font-semibold text-slate-800 mb-4 border-b pb-2 flex items-center gap-2">
                                        <IconPlus className="w-5 h-5 text-emerald-600" /> เพิ่มรายการปุ๋ย/ยา
                                    </h2>
                                    
                                    <form onSubmit={handleAddItem} className="space-y-5">
                                        <div>
                                            <label className="block text-sm font-medium text-slate-700 mb-1">ชื่อรายการ <span className="text-red-500">*</span></label>
                                            <input type="text" name="name" value={formData.name} onChange={handleInputChange} placeholder="เช่น อะบาเม็กติน, ปุ๋ยเกล็ด" required className="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none transition-colors" />
                                        </div>

                                        <div>
                                            <label className="block text-sm font-medium text-slate-700 mb-1">ราคาต่อชิ้น (บาท) <span className="text-red-500">*</span></label>
                                            <input type="number" name="price" value={formData.price} onChange={handleInputChange} placeholder="เช่น 350" min="0" step="0.01" required className="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none transition-colors" />
                                        </div>

                                        <div>
                                            <label className="block text-sm font-medium text-slate-700 mb-1">ขนาดบรรจุ <span className="text-red-500">*</span></label>
                                            <div className="flex shadow-sm rounded-lg">
                                                <input type="number" name="size" value={formData.size} onChange={handleInputChange} placeholder="เช่น 1" min="0.01" step="0.01" required className="w-full px-4 py-2 border border-slate-300 rounded-l-lg focus:ring-2 focus:ring-emerald-500 outline-none z-10" />
                                                <select name="sizeUnit" value={formData.sizeUnit} onChange={handleInputChange} className="px-3 py-2 border border-l-0 border-slate-300 rounded-r-lg bg-slate-50 text-slate-700 font-medium focus:ring-2 focus:ring-emerald-500 outline-none cursor-pointer">
                                                    <option value="kg">กก. (kg)</option>
                                                    <option value="g">กรัม (g)</option>
                                                    <option value="L">ลิตร (L)</option>
                                                    <option value="cc">ซีซี (cc)</option>
                                                </select>
                                            </div>
                                        </div>

                                        <div>
                                            <label className="block text-sm font-medium text-slate-700 mb-1">ปริมาณที่ใช้ต่อน้ำ 200 ลิตร <span className="text-red-500">*</span></label>
                                            <div className="flex shadow-sm rounded-lg">
                                                <input type="number" name="usage" value={formData.usage} onChange={handleInputChange} placeholder="เช่น 200" min="0" step="0.01" required className="w-full px-4 py-2 border border-emerald-300 bg-emerald-50/50 rounded-l-lg focus:ring-2 focus:ring-emerald-500 outline-none z-10" />
                                                <select name="usageUnit" value={formData.usageUnit} onChange={handleInputChange} className="px-3 py-2 border border-l-0 border-emerald-300 rounded-r-lg bg-emerald-100 text-emerald-800 font-medium focus:ring-2 focus:ring-emerald-500 outline-none cursor-pointer">
                                                    <option value="g">กรัม (g)</option>
                                                    <option value="cc">ซีซี (cc)</option>
                                                    <option value="kg">กก. (kg)</option>
                                                    <option value="L">ลิตร (L)</option>
                                                </select>
                                            </div>
                                        </div>

                                        <button type="submit" className="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-3 px-4 rounded-lg transition-colors flex items-center justify-center gap-2 mt-2 shadow-md">
                                            <IconPlus className="w-5 h-5" /> เพิ่มลงในสูตรผสม
                                        </button>
                                    </form>
                                </div>
                            </div>

                            <div className="xl:col-span-8">
                                <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                                    <div className="p-5 border-b border-slate-200 bg-slate-50 flex justify-between items-center">
                                        <h2 className="text-lg font-semibold text-slate-800 flex items-center gap-2">
                                            <IconFlaskConical className="w-5 h-5 text-emerald-600" /> รายการส่วนผสม
                                            <span className="bg-emerald-100 text-emerald-700 text-xs py-1 px-2 rounded-full font-bold ml-1">{items.length}</span>
                                        </h2>
                                        {items.length > 0 && (
                                            <button onClick={handleClearAll} className="text-sm text-red-500 hover:text-red-700 font-medium flex items-center gap-1 px-3 py-1.5 rounded-md hover:bg-red-50 transition-colors">
                                                <IconTrash2 className="w-4 h-4" /> ล้างทั้งหมด
                                            </button>
                                        )}
                                    </div>

                                    {items.length === 0 ? (
                                        <div className="p-16 text-center flex flex-col items-center">
                                            <div className="bg-slate-100 p-5 rounded-full mb-4">
                                                <IconDroplet className="w-10 h-10 text-slate-300" />
                                            </div>
                                            <p className="text-lg font-medium text-slate-500">ยังไม่มีรายการส่วนผสม</p>
                                            <p className="text-sm text-slate-400 mt-1">กรอกข้อมูลด้านซ้ายเพื่อเพิ่มปุ๋ยและยา (รองรับ kg, g, L, cc)</p>
                                        </div>
                                    ) : (
                                        <div className="overflow-x-auto">
                                            <table className="w-full text-left text-sm whitespace-nowrap">
                                                <thead className="bg-slate-50 text-slate-500 uppercase text-xs font-semibold">
                                                    <tr>
                                                        <th className="px-5 py-4">ชื่อรายการ</th>
                                                        <th className="px-5 py-4 text-right">ขนาดที่ซื้อ</th>
                                                        <th className="px-5 py-4 text-right">ราคาฐาน (ต่อ {items.length > 0 ? getBaseUnitLabel(items[0].sizeUnit) : 'หน่วย'})</th>
                                                        <th className="px-5 py-4 text-right">ปริมาณที่ใช้</th>
                                                        <th className="px-5 py-4 text-right bg-emerald-50 text-emerald-700">ต้นทุน (ถัง 200L)</th>
                                                        <th className="px-5 py-4 text-center">ลบ</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-slate-100">
                                                    {items.map((item) => {
                                                        const baseSize = convertToBase(item.size, item.sizeUnit);
                                                        const unitCost = item.price / baseSize;
                                                        const cost200L = calculateItemCost200L(item);
                                                        const baseUnitLabel = getBaseUnitLabel(item.sizeUnit);
                                                        
                                                        return (
                                                            <tr key={item.id} className="hover:bg-slate-50 transition-colors">
                                                                <td className="px-5 py-4 font-medium text-slate-800">
                                                                    {item.name}
                                                                    <div className="text-xs text-slate-400 font-normal">฿{formatCurrency(item.price)} / ชิ้น</div>
                                                                </td>
                                                                <td className="px-5 py-4 text-right">
                                                                    <span className="bg-slate-100 text-slate-700 px-2.5 py-1 rounded-md font-medium border border-slate-200">
                                                                        {item.size} {item.sizeUnit}
                                                                    </span>
                                                                </td>
                                                                <td className="px-5 py-4 text-right text-slate-500">
                                                                    <span className="text-amber-600 font-medium">฿{unitCost.toFixed(4)}</span>
                                                                    <span className="text-xs ml-1">/ {baseUnitLabel}</span>
                                                                </td>
                                                                <td className="px-5 py-4 text-right">
                                                                    <span className="bg-blue-50 text-blue-700 px-2.5 py-1 rounded-md font-medium border border-blue-100">
                                                                        {item.usage} {item.usageUnit}
                                                                    </span>
                                                                </td>
                                                                <td className="px-5 py-4 text-right font-bold text-emerald-600 bg-emerald-50/30">
                                                                    ฿{formatCurrency(cost200L)}
                                                                </td>
                                                                <td className="px-5 py-4 text-center">
                                                                    <button onClick={() => handleRemoveItem(item.id)} className="text-slate-400 hover:text-red-500 transition-colors p-2 hover:bg-red-50 rounded-full">
                                                                        <IconTrash2 className="w-4 h-4" />
                                                                    </button>
                                                                </td>
                                                            </tr>
                                                        );
                                                    })}
                                                </tbody>
                                                <tfoot className="bg-slate-50 font-bold border-t border-slate-200">
                                                    <tr>
                                                        <td colSpan="4" className="px-5 py-5 text-right text-slate-700 uppercase text-xs tracking-wider">
                                                            รวมต้นทุนทั้งหมดต่อถัง 200 ลิตร :
                                                        </td>
                                                        <td className="px-5 py-5 text-right text-emerald-700 text-xl">
                                                            ฿{formatCurrency(totalCost200L)}
                                                        </td>
                                                        <td></td>
                                                    </tr>
                                                </tfoot>
                                            </table>
                                        </div>
                                    )}
                                </div>
                                
                                <div className="mt-5 bg-blue-50/50 border border-blue-100 rounded-xl p-4 flex gap-3 text-sm text-slate-600">
                                    <IconSave className="w-5 h-5 flex-shrink-0 text-blue-500" />
                                    <div>
                                        ระบบบันทึกข้อมูลอัตโนมัติ (Auto-Save) และ <b>คำนวณแปลงหน่วยให้อัตโนมัติ</b> เช่น ซื้อขนาดบรรจุ 1 กิโลกรัม (kg) แต่ระบุการใช้งาน 200 กรัม (g) ระบบจะคำนวณต้นทุนให้ถูกต้องโดยอัตโนมัติ
                                    </div>
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        // Render Application
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
